<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --ground: #14181A;
    --ink: #ECEFEA;
    --ink-soft: #8FA69C;
    --accent: #E8A33D;
    --serif: ui-serif, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1500px;
    height: 1000px;
    background: var(--ground);
    overflow: hidden;
  }
  .stage {
    position: relative;
    width: 1500px;
    height: 1000px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 130px;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 26px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 34px;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 220px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  canvas.pulse {
    display: block;
    width: 1240px;
    height: 110px;
    margin-top: 30px;
  }
  .tagline {
    font-family: var(--mono);
    font-size: 27px;
    color: var(--ink-soft);
    margin-top: 30px;
    letter-spacing: 0.01em;
  }
  .tagline strong { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
  <div class="stage">
    <div class="eyebrow">Slack Agent Builder Challenge &middot; Agent for Good</div>
    <h1>Pace</h1>
    <canvas class="pulse" id="pulse" width="1240" height="110"></canvas>
    <div class="tagline"><strong>Your copilot never gets tired.</strong> You do.</div>
  </div>

<script>
  var canvas = document.getElementById('pulse');
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height, mid = h / 2;

  ctx.lineWidth = 5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  var n = 160;
  var points = [];
  for (var i = 0; i < n; i++) {
    var t = i / (n - 1);
    var amp = 0.9 - t * 0.82; // erratic (burst) settling to calm
    var jitter = (Math.sin(i * 1.7) * 0.5 + Math.sin(i * 4.3) * 0.3 + Math.sin(i * 9.1) * 0.2);
    var y = mid + jitter * amp * (h * 0.46);
    points.push([t * w, y]);
  }

  // gradient stroke: amber (burst) fading toward the muted sage line color
  var grad = ctx.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, '#E8A33D');
  grad.addColorStop(1, '#5C7168');
  ctx.strokeStyle = grad;

  ctx.beginPath();
  points.forEach(function (p, i) { i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]); });
  ctx.stroke();
</script>
</body>
</html>
